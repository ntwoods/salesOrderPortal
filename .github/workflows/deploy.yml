name: Deploy App To GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Validate Frontend Secrets
        shell: bash
        run: |
          RAW_URL="${{ secrets.VITE_APPS_SCRIPT_URL }}"
          GOOGLE_CLIENT_ID="${{ secrets.VITE_GOOGLE_CLIENT_ID }}"

          if [ -z "$RAW_URL" ]; then
            echo "Missing secret: VITE_APPS_SCRIPT_URL"
            exit 1
          fi
          if [ -z "$GOOGLE_CLIENT_ID" ]; then
            echo "Missing secret: VITE_GOOGLE_CLIENT_ID"
            exit 1
          fi

          # For Apps Script web apps, frontend requests must target the original /exec URL.
          # Direct script.googleusercontent.com echo URLs are redirect targets and break POST actions.
          if [[ "$RAW_URL" == *script.googleusercontent.com/* ]]; then
            echo "Invalid VITE_APPS_SCRIPT_URL: use the original script.google.com ... /exec URL, not script.googleusercontent.com."
            exit 1
          fi

          echo "VITE_APPS_SCRIPT_URL=$RAW_URL" >> "$GITHUB_ENV"
          echo "VITE_GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID" >> "$GITHUB_ENV"
          echo "Configured endpoint host: $(echo "$RAW_URL" | awk -F/ '{print $3}')"

      - name: Build
        shell: bash
        run: |
          if [ -f CNAME ]; then
            BASE_PATH="/"
          else
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            BASE_PATH="/${REPO_NAME}/"
          fi
          echo "Using Vite base path: ${BASE_PATH}"
          npm run build -- --base "${BASE_PATH}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
