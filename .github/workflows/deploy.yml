name: Deploy App To GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Resolve Apps Script URL
        shell: bash
        run: |
          RAW_URL="${{ secrets.VITE_APPS_SCRIPT_URL }}"
          GOOGLE_CLIENT_ID="${{ secrets.VITE_GOOGLE_CLIENT_ID }}"

          if [ -z "$RAW_URL" ]; then
            echo "Missing secret: VITE_APPS_SCRIPT_URL"
            exit 1
          fi
          if [ -z "$GOOGLE_CLIENT_ID" ]; then
            echo "Missing secret: VITE_GOOGLE_CLIENT_ID"
            exit 1
          fi

          if [[ "$RAW_URL" == *script.google.com/macros/s/*/exec* ]]; then
            echo "Resolving redirect-free Apps Script URL from /exec ..."
            RESOLVED_URL="$(curl -sSL -o /dev/null -w '%{url_effective}' "$RAW_URL")"
            if [ -z "$RESOLVED_URL" ]; then
              echo "Failed to resolve Apps Script URL."
              exit 1
            fi
          else
            RESOLVED_URL="$RAW_URL"
          fi

          echo "VITE_APPS_SCRIPT_URL=$RESOLVED_URL" >> "$GITHUB_ENV"
          echo "VITE_GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID" >> "$GITHUB_ENV"
          echo "Resolved endpoint host: $(echo "$RESOLVED_URL" | awk -F/ '{print $3}')"

      - name: Build
        shell: bash
        run: |
          if [ -f CNAME ]; then
            BASE_PATH="/"
          else
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            BASE_PATH="/${REPO_NAME}/"
          fi
          echo "Using Vite base path: ${BASE_PATH}"
          npm run build -- --base "${BASE_PATH}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
